@if (isOpen()) {

  <!-- =========================
       BACKDROP
  ========================== -->
  <div class="sidebar-backdrop" (click)="close()"></div>

  <nav class="sidebar" aria-label="Menú de administrador">

    <!-- =========================
         BRAND
    ========================== -->
    <div class="sidebar__brand">
      <div class="sidebar__logo">
        <span class="sidebar__logo-ruby">Ruby</span>
        <span class="sidebar__logo-tune">Tune</span>
      </div>
      <p class="sidebar__role">Admin panel</p>
    </div>

    <!-- =========================
         NAV PRINCIPAL
    ========================== -->
    <ul class="sidebar__nav">

      <!-- DASHBOARD -->
      <li>
        <button
          type="button"
          class="sidebar__item"
          [class.sidebar__item--active]="isActive('/admin/dashboard')"
          (click)="navigate('/admin/dashboard')"
        >
          <lucide-icon [img]="LayoutDashboard" [size]="18" />
          Dashboard
        </button>
      </li>

      <!-- USUARIOS -->
      <li>
        <button
          type="button"
          class="sidebar__item"
          [class.sidebar__item--active]="isActive('/admin/usuarios')"
          (click)="navigate('/admin/usuarios')"
        >
          <lucide-icon [img]="Users" [size]="18" />
          Gestión de Usuarios
        </button>
      </li>

      <!-- =========================
           CATÁLOGO MUSICAL
      ========================== -->
      <li>
        <button
          type="button"
          class="sidebar__item sidebar__item--group"
          [class.sidebar__item--active]="isCatalogoActive()"
          (click)="toggleCatalogo()"
        >
          <lucide-icon [img]="Library" [size]="18" />
          <span>Catálogo Musical</span>

          <lucide-icon
            class="sidebar__chevron"
            [img]="catalogoExpanded() ? ChevronDown : ChevronRight"
            [size]="14"
          />
        </button>

        @if (catalogoShouldExpand) {
          <ul class="sidebar__sub">

            <!-- GÉNEROS -->
            <li>
              <button
                type="button"
                class="sidebar__sub-item"
                [class.sidebar__sub-item--active]="isActive('/admin/generos')"
                (click)="navigate('/admin/generos')"
              >
                <lucide-icon [img]="Tag" [size]="15" />
                Géneros
              </button>
            </li>

            <!-- CANCIONES -->
            <li>
              <button
                type="button"
                class="sidebar__sub-item"
                [class.sidebar__sub-item--active]="isActive('/admin/canciones')"
                (click)="navigate('/admin/canciones')"
              >
                <lucide-icon [img]="Music" [size]="15" />
                Canciones
              </button>
            </li>

            <!-- ÁLBUMES -->
            <li>
              <button
                type="button"
                class="sidebar__sub-item"
                [class.sidebar__sub-item--active]="isActive('/admin/albumes')"
                (click)="navigate('/admin/albumes')"
              >
                <lucide-icon [img]="Disc3" [size]="15" />
                Álbumes
              </button>
            </li>

            <!-- ARTISTAS -->
            <li>
              <button
                type="button"
                class="sidebar__sub-item"
                [class.sidebar__sub-item--active]="isActive('/admin/artistas')"
                (click)="navigate('/admin/artistas')"
              >
                <lucide-icon [img]="Mic2" [size]="15" />
                Artistas
              </button>
            </li>

            <!-- ✅ ESTACIONES (NUEVO) -->
            <li>
              <button
                type="button"
                class="sidebar__sub-item"
                [class.sidebar__sub-item--active]="isActive('/admin/estaciones')"
                (click)="navigate('/admin/estaciones')"
              >
                <lucide-icon [img]="Radio" [size]="15" />
                Estaciones
              </button>
            </li>

          </ul>
        }
      </li>

    </ul>

    <!-- 
         REPORTES (BOTÓN DESTACADO)
   -->
    <div class="sidebar__reports">
      <button
        type="button"
        class="sidebar__reports-btn"
        [class.active]="isActive('/admin/reportes')"
        (click)="navigate('/admin/reportes')"
      >
        <lucide-icon [img]="Flag" [size]="18" />
        Reportes
      </button>
    </div>

    <!-- 
         LOGOUT
     -->
    <button type="button" class="sidebar__logout" (click)="logout()">
      <lucide-icon [img]="LogOut" [size]="18" />
      Cerrar Sesión
    </button>

  </nav>
}
