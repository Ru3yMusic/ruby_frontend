<rm-onboarding-template>

  <div class="complete">

    <div class="complete__content">
      <h1 class="complete__title">¡Excelentes elecciones!</h1>
      <p class="complete__subtitle">Crearemos estaciones personalizadas para ti.</p>

      <div class="complete__bubbles">
        <div class="complete__bubble complete__bubble--1"></div>
        <div class="complete__bubble complete__bubble--2"></div>
        <div class="complete__bubble complete__bubble--3"></div>
      </div>
    </div>

    <div class="complete__actions">
      <rm-button variant="primary" size="lg" (clicked)="onListen()">
        Escuchar ahora
      </rm-button>
      <rm-button variant="secondary" size="lg" (clicked)="onSkip()">
        Ahora no
      </rm-button>
    </div>

  </div>

</rm-onboarding-template>
