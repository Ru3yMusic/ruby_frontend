<div class="onboarding-complete-container">

  <!-- TEXTO -->
  <div class="header">
    <h1 class="title">¡Excelentes elecciones!</h1>
    <p class="subtitle">
      Crearemos una experiencia basada en los artistas que te gustan.
    </p>
  </div>

  <!-- CÍRCULOS DE ARTISTAS -->
  <div class="circles-container" *ngIf="selectedStations().length > 0">

    <div
      class="circle"
      *ngFor="let station of selectedStations(); let i = index"
      [ngClass]="'circle-' + i"
    >
      <img
        class="circle-image"
        [src]="station.photoUrl || '/assets/icons/avatar-placeholder.png'"
        [alt]="station.name"
      />
    </div>

  </div>

  <!-- BOTONES -->
  <div class="actions">

    <button
      type="button"
      class="btn-primary"
      (click)="listenNow()"
    >
      Escuchar ahora
    </button>

    <button
      type="button"
      class="btn-secondary"
      (click)="skip()"
    >
      Ahora no
    </button>

  </div>

</div>
