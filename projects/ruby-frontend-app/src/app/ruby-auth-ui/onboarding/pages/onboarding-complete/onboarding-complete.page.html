<div class="onboarding-complete-container">

  <!-- TEXTO -->
  <div class="header">
    <h1 class="title">¡Excelentes elecciones!</h1>
    <p class="subtitle">
      Crearemos estaciones personalizadas para ti.
    </p>
  </div>

  <!-- CÍRCULOS DE ESTACIONES -->
  <div class="circles-container" *ngIf="selectedStations().length > 0">

    <div
      class="circle"
      *ngFor="let station of selectedStations(); let i = index"
      [ngClass]="'circle-' + i"
      [style.background]="'linear-gradient(135deg, ' + station.gradientStart + ', ' + station.gradientEnd + ')'"
    >
    </div>

  </div>

  <!-- BOTONES -->
  <div class="actions">

    <button
      type="button"
      class="btn-primary"
      (click)="listenNow()"
    >
      Escuchar ahora
    </button>

    <button
      type="button"
      class="btn-secondary"
      (click)="skip()"
    >
      Ahora no
    </button>

  </div>

</div>
