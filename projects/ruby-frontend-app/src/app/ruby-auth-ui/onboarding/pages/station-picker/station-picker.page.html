<div class="station-picker-container">

  <!-- ENCABEZADO -->
  <div class="header">
    <h1 class="title">Elige 3 o mas artistas que te gusten</h1>
    <p class="subtitle">
      Tus elecciones nos ayudarán a personalizar mejor tu experiencia
    </p>
  </div>

  <!-- BUSCADOR -->
  <div class="search-box">
    <input
      type="text"
      class="search-input"
      placeholder="Buscar artista"
      [value]="searchTerm()"
      (input)="onSearch(($any($event.target)).value)"
    />
  </div>

  <!-- GRID DE ESTACIONES -->
  <div class="stations-grid" *ngIf="filteredStations().length > 0; else emptyState">
    <button
      type="button"
      class="station-bubble"
      *ngFor="let station of filteredStations()"
      [class.selected]="isSelected(station.id)"
      (click)="toggleStation(station.id)"
    >
      <img
        class="station-image"
        [src]="station.photoUrl || '/assets/icons/avatar-placeholder.png'"
        [alt]="station.name"
      />
      <span class="station-name">{{ station.name }}</span>

      <!-- CHECK DE SELECCIÓN -->
      <span class="station-check" *ngIf="isSelected(station.id)">✓</span>
    </button>
  </div>

  <!-- ERROR -->
  <p class="error-message" *ngIf="showError()">
    Debes seleccionar al menos 3 artistas para continuar
  </p>

  <!-- BOTÓN CONTINUAR -->
  <button
    type="button"
    class="continue-button"
    (click)="continue()"
    [disabled]="selectedIds().length === 0"
  >
    Listo
  </button>

  <!-- ESTADO VACÍO -->
  <ng-template #emptyState>
    <div class="empty-state">
      <p>No hay artistas disponibles por ahora.</p>
    </div>
  </ng-template>

</div>
