<div class="register-password-container">

  <!-- BOTÓN VOLVER -->
  <button type="button" class="back-button" (click)="onBackClick()">
    Volver
  </button>

  <!-- ENCABEZADO -->
  <div class="header">
    <h2 class="title">Crea una contraseña</h2>
    <p class="subtitle">
      Define una contraseña segura para tu cuenta
    </p>
  </div>

  <!-- FORMULARIO -->
  <form class="form" [formGroup]="form" (ngSubmit)="submit()">

    <!-- CAMPO CONTRASEÑA -->
    <div class="field">
      <label class="label" for="register-password">
        Contraseña
      </label>

      <div class="password-wrapper">
        <input
          id="register-password"
          class="input"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          placeholder="Ingresa tu contraseña"
          autocomplete="new-password"
        />

        <button
          type="button"
          class="toggle-password"
          (click)="togglePasswordVisibility()"
        >
          {{ showPassword() ? 'Ocultar' : 'Mostrar' }}
        </button>
      </div>

      <!-- ERROR CONTRASEÑA -->
      <p class="error" *ngIf="passwordError">
        {{ passwordError }}
      </p>
    </div>

    <!-- CAMPO CONFIRMAR CONTRASEÑA -->
    <div class="field">
      <label class="label" for="register-confirm-password">
        Confirmar contraseña
      </label>

      <div class="password-wrapper">
        <input
          id="register-confirm-password"
          class="input"
          [type]="showConfirmPassword() ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="Confirma tu contraseña"
          autocomplete="new-password"
        />

        <button
          type="button"
          class="toggle-password"
          (click)="toggleConfirmPasswordVisibility()"
        >
          {{ showConfirmPassword() ? 'Ocultar' : 'Mostrar' }}
        </button>
      </div>

      <!-- ERROR CONFIRMAR CONTRASEÑA -->
      <p class="error" *ngIf="confirmPasswordError">
        {{ confirmPasswordError }}
      </p>
    </div>

    <!-- REGLAS DE CONTRASEÑA -->
    <div class="password-hints">
      <p class="hint">La contraseña debe cumplir estas reglas:</p>
      <ul class="hint-list">
        <li>Mínimo 8 caracteres</li>
        <li>Al menos una mayúscula</li>
        <li>Al menos un número</li>
      </ul>
    </div>

    <!-- ERROR GENERAL -->
    <p class="error general-error" *ngIf="generalError()">
      {{ generalError() }}
    </p>

    <!-- BOTÓN CONTINUAR -->
    <button
      class="submit-button"
      type="submit"
      [disabled]="isSubmitting()"
    >
      {{ isSubmitting() ? 'Validando...' : 'Continuar' }}
    </button>

  </form>

</div>
