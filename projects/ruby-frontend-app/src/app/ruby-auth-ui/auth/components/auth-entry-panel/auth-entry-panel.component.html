<div class="entry-container">

  <!-- TÍTULO -->
  <div class="entry-header">
    <h2 class="title">Bienvenido</h2>
    <p class="subtitle">Inicia sesión o crea una cuenta para continuar</p>
  </div>

  <!-- BOTÓN GOOGLE -->
  <button class="btn google-btn" (click)="onGoogleClick()">
    Continuar con Google
  </button>

  <!-- DIVISOR -->
  <div class="divider">
    <span>o</span>
  </div>

  <!-- BOTONES PRINCIPALES -->
  <div class="actions">
    <button class="btn primary" (click)="onLoginClick()">
      Iniciar sesión
    </button>

    <button class="btn secondary" (click)="onRegisterClick()">
      Crear cuenta
    </button>
  </div>

</div>
