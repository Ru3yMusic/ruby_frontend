<div class="register-email-container">

  <!-- BOTÓN VOLVER -->
  <button type="button" class="back-button" (click)="onBackClick()">
    Volver
  </button>

  <!-- ENCABEZADO -->
  <div class="header">
    <h2 class="title">Crea tu cuenta</h2>
    <p class="subtitle">
      Ingresa tu correo electrónico para comenzar
    </p>
  </div>

  <!-- BOTÓN GOOGLE (OPCIONAL / FUTURO) -->
  <button class="google-btn" (click)="onGoogleClick()">
    Continuar con Google
  </button>

  <!-- DIVISOR -->
  <div class="divider">
    <span>o</span>
  </div>

  <!-- FORMULARIO -->
  <form class="form" [formGroup]="form" (ngSubmit)="submit()">

    <!-- CAMPO EMAIL -->
    <div class="field">
      <label class="label" for="register-email">
        Correo electrónico
      </label>

      <input
        id="register-email"
        class="input"
        type="email"
        formControlName="email"
        placeholder="correo@ejemplo.com"
        autocomplete="email"
      />

      <!-- ERROR DE VALIDACIÓN -->
      <p class="error" *ngIf="emailError">
        {{ emailError }}
      </p>
    </div>

    <!-- ERROR GENERAL -->
    <p class="error general-error" *ngIf="generalError()">
      {{ generalError() }}
    </p>

    <!-- BOTÓN CONTINUAR -->
    <button
      class="submit-button"
      type="submit"
      [disabled]="isSubmitting()"
    >
      {{ isSubmitting() ? 'Validando...' : 'Continuar' }}
    </button>

  </form>

</div>
