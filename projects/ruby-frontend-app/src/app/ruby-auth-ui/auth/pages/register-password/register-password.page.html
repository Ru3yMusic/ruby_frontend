<rm-auth-template theme="red" [showBack]="true" [showLogo]="false" [totalSteps]="5" [currentStep]="2">

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="step" novalidate>

    <h1 class="step__title">Crea una contraseña</h1>

    <rm-input
      formControlName="password"
      type="password"
      placeholder="Crea una contraseña"
      hint="Debe tener al menos 8 caracteres."/>

    <rm-button type="submit" variant="primary" size="lg" [disabled]="form.invalid">
      Continuar
    </rm-button>

  </form>

</rm-auth-template>
