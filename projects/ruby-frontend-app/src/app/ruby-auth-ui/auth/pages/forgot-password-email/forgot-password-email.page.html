<rm-auth-template theme="red" [showBack]="true" [showLogo]="true">

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="step" novalidate>

    <h1 class="step__title">Ingresa tu correo electrónico</h1>

    <rm-input
      formControlName="email"
      type="email"
      placeholder="Ingresa tu correo electrónico"/>

    @if (serverError()) {
      <p class="step__error" role="alert">{{ serverError() }}</p>
    }

    <rm-button
      type="submit"
      variant="primary"
      size="lg"
      [loading]="loading()"
      [disabled]="form.invalid">
      Enviar código
    </rm-button>

  </form>

</rm-auth-template>
