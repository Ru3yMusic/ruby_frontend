<rm-auth-template theme="red" [showBack]="true" [showLogo]="false" [totalSteps]="5" [currentStep]="4">

  <div class="step">
    <h1 class="step__title">¿Cómo te identificas?</h1>

    <div class="step__chips">
      @for (opt of options; track opt.value) {
        <rm-gender-chip
          [label]="opt.label"
          [selected]="selected() === opt.value"
          (toggled)="select(opt.value)"/>
      }
    </div>

    <rm-button variant="primary" size="lg" [disabled]="!selected()" (clicked)="onContinue()">
      Continuar
    </rm-button>
  </div>

</rm-auth-template>
