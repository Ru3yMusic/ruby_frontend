<rm-auth-template theme="red" [showBack]="true" [showLogo]="false" [totalSteps]="5" [currentStep]="3">

  <div class="step">
    <h1 class="step__title">¿Cuál es tu fecha de nacimiento?</h1>

    <div class="step__picker">
      <rm-date-wheel-picker (dateChanged)="onDateChange($event)"/>
    </div>

    <rm-button variant="primary" size="lg" (clicked)="onContinue()">
      Continuar
    </rm-button>
  </div>

</rm-auth-template>
