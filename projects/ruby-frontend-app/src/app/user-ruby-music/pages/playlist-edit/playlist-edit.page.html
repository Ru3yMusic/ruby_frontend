<div class="playlist-edit">
  <header>
    <a [routerLink]="['/library/playlist', route.snapshot.paramMap.get('id')]">‹</a>
    <h1>Editar playlist</h1>
    <button type="button" (click)="save()">Guardar</button>
  </header>

  <section class="playlist-edit__list">
    @for (track of localTracks(); track track.id; let i = $index) {
      <article>
        <span class="cover" [style.background]="track.cover"></span>
        <div>
          <h2>{{ track.title }}</h2>
          <p>{{ track.artist }}</p>
        </div>
        <div class="playlist-edit__reorder">
          <button type="button" [disabled]="i === 0" (click)="moveUp(track.id)" title="Mover arriba">▲</button>
          <button type="button" [disabled]="i === localTracks().length - 1" (click)="moveDown(track.id)" title="Mover abajo">▼</button>
          <span class="drag">☰</span>
        </div>
      </article>
    }
  </section>
</div>
