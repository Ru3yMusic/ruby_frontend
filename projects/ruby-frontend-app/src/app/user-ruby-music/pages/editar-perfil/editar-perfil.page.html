<div class="ep">
  <header class="ep__header">
    <a class="ep__back" routerLink="/home" aria-label="Volver">
      <lucide-icon [img]="ChevronLeft" [size]="24" [strokeWidth]="2.3" />
    </a>
    <h1>Editar Perfil</h1>
    <button type="button" class="ep__save" (click)="save()">Guardar</button>
  </header>

  <div class="ep__body">
    <!-- Avatar clickeable -->
    <label class="ep__avatar-label">
      @if (photoPreview()) {
        <img class="ep__avatar-img" [src]="photoPreview()!" alt="Foto de perfil" />
      } @else {
        <div class="ep__avatar-placeholder">
          {{ displayName()[0]?.toUpperCase() || 'U' }}
        </div>
      }
      <div class="ep__avatar-overlay">
        <lucide-icon [img]="Camera" [size]="22" [strokeWidth]="2" />
      </div>
      <input type="file" accept="image/*" class="ep__file-input" (change)="onFileSelected($event)" />
    </label>

    <!-- Campo nombre -->
    <div class="ep__field">
      <label class="ep__label">Nombre de Usuario</label>
      <input
        class="ep__input"
        type="text"
        [value]="displayName()"
        (input)="displayName.set($any($event.target).value)"
        placeholder="Tu nombre"
        maxlength="30"
      />
      <p class="ep__hint">{{ displayName() }}</p>
    </div>
  </div>
</div>
