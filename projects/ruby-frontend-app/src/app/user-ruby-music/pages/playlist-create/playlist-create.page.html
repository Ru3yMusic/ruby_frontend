<div class="playlist-create">
  <div class="playlist-create__card">
    <p>Ponle un nombre a tu playlist</p>
    <input [value]="name()" (input)="name.set($any($event.target).value)" />
    <div class="playlist-create__actions">
      <button type="button" class="secondary" (click)="cancel()">Cancelar</button>
      <button type="button" class="primary" (click)="create()">Crear</button>
    </div>
  </div>
</div>
