<div class="add-artists">
  <div class="add-artists__content">
    <h1>Elige tus artistas</h1>

    <input class="add-artists__search" [ngModel]="query()" (ngModelChange)="query.set($event)" placeholder="Buscar artistas" type="text"/>

    <section class="add-artists__top">
      <h2>top artists</h2>
      <div class="top-grid">
        <article class="top-item"><span>2pac</span><em>2</em></article>
        <article class="top-item"><span>Daniel Casear</span><em>1</em></article>
        <article class="top-item"><span>Yan Block</span><em>3</em></article>
      </div>
    </section>

    <section class="add-artists__suggestions">
      <h3>Sugerencias</h3>
      <div class="suggestions-grid">
        @for (artist of suggestions; track artist.id) {
          <button type="button" class="artist-chip" (click)="toggle(artist.id)">
            <span class="artist-chip__avatar">{{ artist.image }}</span>
            @if (selected()[artist.id]) {
              <span class="artist-chip__check">✓</span>
            }
            <span class="artist-chip__name">{{ artist.name }}</span>
          </button>
        }
      </div>
    </section>

    <button type="button" class="add-artists__done" [disabled]="selectedArtists().length === 0" (click)="complete()">Listo</button>
  </div>
</div>
