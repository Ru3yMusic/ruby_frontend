<div class="field" [class.field--error]="error()">

  <div class="field__wrapper">
    <input
      [type]="resolvedType"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [value]="value()"
      (input)="onInput($event)"
      (blur)="onTouched()"
      class="field__input"
      autocomplete="off"
    />

    @if (type() === 'password') {
      <button type="button" class="field__eye" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'">
        @if (showPassword()) {
          <lucide-icon [img]="EyeOff" [size]="20" [strokeWidth]="2" />
        } @else {
          <lucide-icon [img]="Eye" [size]="20" [strokeWidth]="2" />
        }
      </button>
    }
  </div>

  @if (hint() && !error()) {
    <span class="field__hint">{{ hint() }}</span>
  }

  @if (error()) {
    <span class="field__error" role="alert">{{ error() }}</span>
  }

</div>
