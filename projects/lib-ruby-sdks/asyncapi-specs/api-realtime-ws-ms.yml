asyncapi: '3.0.0'
id: 'urn:com:rubymusic:realtime-ws-ms'
defaultContentType: application/json

info:
  title: RubyMusic Realtime WebSocket Service
  version: '1.0.0'
  description: |
    Event-driven WebSocket microservice for real-time station comments,
    user presence, and notification delivery.

    **Authentication:** Pass `X-User-Id` in Socket.IO handshake headers
    (forwarded by api-gateway from JWT claims).
  contact:
    name: RubyMusic Team
    email: francolitobo@gmail.com
  license:
    name: Private
  tags:
    - name: websocket
      description: Socket.IO WebSocket events
    - name: kafka
      description: Kafka async events (Avro)
    - name: presence
      description: User presence and heartbeat

servers:
  websocket:
    host: realtime-ws-ms:3001
    protocol: ws
    description: Socket.IO WebSocket server
  kafka:
    host: kafka:9092
    protocol: kafka
    description: Kafka broker for internal event streaming

channels:

  # ── WebSocket: Client → Server ──────────────────────────────────────────

  joinStation:
    address: join_station
    description: Client joins a station room — establishes presence in Redis
    messages:
      joinStationMessage:
        $ref: '#/components/messages/JoinStationMessage'

  leaveStation:
    address: leave_station
    description: Client explicitly leaves the current station room
    messages:
      leaveStationMessage:
        $ref: '#/components/messages/EmptyMessage'

  sendComment:
    address: send_comment
    description: |
      Client publishes a comment. Gateway broadcasts immediately (optimistic)
      then publishes realtime.comment.created to Kafka for persistence.
    messages:
      sendCommentMessage:
        $ref: '#/components/messages/SendCommentMessage'

  pingPresence:
    address: ping_presence
    description: Heartbeat to refresh Redis TTL (300 s). Send every 60 s.
    messages:
      pingPresenceMessage:
        $ref: '#/components/messages/EmptyMessage'

  # ── WebSocket: Server → Client ──────────────────────────────────────────

  newComment:
    address: new_comment
    description: Broadcast to all users in station:{stationId} room
    messages:
      commentPayload:
        $ref: '#/components/messages/CommentPayload'

  notification:
    address: notification
    description: Pushed to user:{userId} private room — triggered by Kafka notification.push consumer
    messages:
      notificationPayload:
        $ref: '#/components/messages/NotificationPayload'

  listenerCount:
    address: listener_count
    description: Broadcast to station room when listener count changes
    messages:
      listenerCountPayload:
        $ref: '#/components/messages/ListenerCountPayload'

  pongPresence:
    address: pong_presence
    description: Response to ping_presence
    messages:
      pongPresencePayload:
        $ref: '#/components/messages/PongPresencePayload'

  joinedStation:
    address: joined_station
    description: Acknowledgement sent to the joining client after join_station
    messages:
      joinedStationPayload:
        $ref: '#/components/messages/JoinedStationPayload'

  # ── Kafka Topics ──────────────────────────────────────────────────────────

  kafkaCommentCreated:
    address: realtime.comment.created
    description: Produced when a comment is created — consumed by realtime-api-ms for persistence
    bindings:
      kafka:
        topic: realtime.comment.created
        partitions: 6
        replicas: 1
        bindingVersion: '0.4.0'
    messages:
      kafkaCommentCreatedMessage:
        $ref: '#/components/messages/KafkaCommentCreated'

  kafkaCommentLiked:
    address: realtime.comment.liked
    description: Produced when a comment is liked or unliked — consumed by realtime-api-ms
    bindings:
      kafka:
        topic: realtime.comment.liked
        partitions: 6
        replicas: 1
        bindingVersion: '0.4.0'
    messages:
      kafkaCommentLikedMessage:
        $ref: '#/components/messages/KafkaCommentLiked'

  kafkaNotificationPush:
    address: realtime.notification.push
    description: Consumed from realtime-api-ms — triggers WebSocket push to recipient
    bindings:
      kafka:
        topic: realtime.notification.push
        partitions: 6
        replicas: 1
        bindingVersion: '0.4.0'
    messages:
      kafkaNotificationPushMessage:
        $ref: '#/components/messages/KafkaNotificationPush'

operations:

  # ── Client → Server ──────────────────────────────────────────────────────

  onJoinStation:
    action: receive
    channel:
      $ref: '#/channels/joinStation'
    messages:
      - $ref: '#/channels/joinStation/messages/joinStationMessage'
    tags:
      - name: websocket
      - name: presence

  onLeaveStation:
    action: receive
    channel:
      $ref: '#/channels/leaveStation'
    messages:
      - $ref: '#/channels/leaveStation/messages/leaveStationMessage'
    tags:
      - name: websocket
      - name: presence

  onSendComment:
    action: receive
    channel:
      $ref: '#/channels/sendComment'
    messages:
      - $ref: '#/channels/sendComment/messages/sendCommentMessage'
    tags:
      - name: websocket

  onPingPresence:
    action: receive
    channel:
      $ref: '#/channels/pingPresence'
    messages:
      - $ref: '#/channels/pingPresence/messages/pingPresenceMessage'
    tags:
      - name: websocket
      - name: presence

  # ── Server → Client ──────────────────────────────────────────────────────

  emitNewComment:
    action: send
    channel:
      $ref: '#/channels/newComment'
    messages:
      - $ref: '#/channels/newComment/messages/commentPayload'
    tags:
      - name: websocket

  emitNotification:
    action: send
    channel:
      $ref: '#/channels/notification'
    messages:
      - $ref: '#/channels/notification/messages/notificationPayload'
    tags:
      - name: websocket

  emitListenerCount:
    action: send
    channel:
      $ref: '#/channels/listenerCount'
    messages:
      - $ref: '#/channels/listenerCount/messages/listenerCountPayload'
    tags:
      - name: websocket

  emitPongPresence:
    action: send
    channel:
      $ref: '#/channels/pongPresence'
    messages:
      - $ref: '#/channels/pongPresence/messages/pongPresencePayload'
    tags:
      - name: websocket
      - name: presence

  emitJoinedStation:
    action: send
    channel:
      $ref: '#/channels/joinedStation'
    messages:
      - $ref: '#/channels/joinedStation/messages/joinedStationPayload'
    tags:
      - name: websocket

  # ── Kafka: Produced ───────────────────────────────────────────────────────

  publishCommentCreated:
    action: send
    channel:
      $ref: '#/channels/kafkaCommentCreated'
    messages:
      - $ref: '#/channels/kafkaCommentCreated/messages/kafkaCommentCreatedMessage'
    tags:
      - name: kafka

  publishCommentLiked:
    action: send
    channel:
      $ref: '#/channels/kafkaCommentLiked'
    messages:
      - $ref: '#/channels/kafkaCommentLiked/messages/kafkaCommentLikedMessage'
    tags:
      - name: kafka

  # ── Kafka: Consumed ───────────────────────────────────────────────────────

  consumeNotificationPush:
    action: receive
    channel:
      $ref: '#/channels/kafkaNotificationPush'
    messages:
      - $ref: '#/channels/kafkaNotificationPush/messages/kafkaNotificationPushMessage'
    tags:
      - name: kafka

components:
  messages:

    JoinStationMessage:
      name: JoinStationMessage
      title: Join Station
      contentType: application/json
      payload:
        title: JoinStationPayload
        type: object
        required: [stationId, songId]
        properties:
          stationId:
            type: string
            format: uuid
          songId:
            type: string
            format: uuid

    EmptyMessage:
      name: EmptyMessage
      title: Empty (no payload)
      contentType: application/json
      payload:
        title: EmptyPayload
        type: object

    SendCommentMessage:
      name: SendCommentMessage
      title: Send Comment
      contentType: application/json
      payload:
        title: SendCommentPayload
        type: object
        required: [commentId, songId, stationId, content]
        properties:
          commentId:
            type: string
            format: uuid
            description: Client-generated UUID — idempotency key
          songId:
            type: string
            format: uuid
          stationId:
            type: string
            format: uuid
          content:
            type: string
            maxLength: 500
          mentions:
            type: array
            items:
              type: string
              format: uuid
            default: []

    CommentPayload:
      name: CommentPayload
      title: New Comment Broadcast
      contentType: application/json
      payload:
        title: WsCommentPayload
        type: object
        properties:
          commentId:       { type: string, format: uuid }
          songId:          { type: string, format: uuid }
          stationId:       { type: string, format: uuid }
          userId:          { type: string, format: uuid }
          username:        { type: string }
          profilePhotoUrl: { type: string, nullable: true }
          content:         { type: string }
          mentions:        { type: array, items: { type: string } }
          likesCount:      { type: integer, default: 0 }
          createdAt:       { type: string, format: date-time }

    NotificationPayload:
      name: NotificationPayload
      title: Notification Push
      contentType: application/json
      payload:
        title: WsNotificationPayload
        type: object
        properties:
          notificationId: { type: string }
          actorId:        { type: string, format: uuid }
          actorUsername:  { type: string }
          actorPhotoUrl:  { type: string, nullable: true }
          type:
            title: WsNotificationType
            type: string
            enum: [COMMENT_REACTION, MENTION, FRIEND_REQUEST, FRIEND_ACCEPTED]
          targetId:   { type: string }
          targetType: { type: string }
          createdAt:  { type: string, format: date-time }

    ListenerCountPayload:
      name: ListenerCountPayload
      title: Listener Count
      contentType: application/json
      payload:
        title: WsListenerCountPayload
        type: object
        properties:
          stationId: { type: string, format: uuid }
          count:     { type: integer }

    PongPresencePayload:
      name: PongPresencePayload
      title: Pong Presence
      contentType: application/json
      payload:
        title: WsPongPresencePayload
        type: object
        properties:
          ok: { type: boolean }

    JoinedStationPayload:
      name: JoinedStationPayload
      title: Joined Station Acknowledgement
      contentType: application/json
      payload:
        title: WsJoinedStationPayload
        type: object
        properties:
          stationId:     { type: string, format: uuid }
          listenerCount: { type: integer }

    # ── Avro messages: Multi Format Schema Object (3.0.0 syntax) ─────────────
    # schemaFormat goes INSIDE payload, actual schema goes under payload.schema

    KafkaCommentCreated:
      name: KafkaCommentCreated
      title: Comment Created (Avro)
      payload:
        schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
        schema:
          type: record
          name: CommentCreatedEvent
          namespace: com.rubymusic.realtime
          doc: Emitted by realtime-ws-ms when a user creates a comment in a station
          fields:
            - name: comment_id
              type: string
              doc: Client-generated UUID — idempotency key
            - name: song_id
              type: string
            - name: station_id
              type: string
            - name: user_id
              type: string
            - name: username
              type: string
            - name: profile_photo_url
              type:
                - 'null'
                - string
              default: null
            - name: content
              type: string
            - name: mentions
              type:
                type: array
                items: string
              default: []
            - name: timestamp
              type: long
              logicalType: timestamp-millis

    KafkaCommentLiked:
      name: KafkaCommentLiked
      title: Comment Liked (Avro)
      payload:
        schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
        schema:
          type: record
          name: CommentLikedEvent
          namespace: com.rubymusic.realtime
          doc: Emitted by realtime-ws-ms when a user likes or unlikes a comment
          fields:
            - name: comment_id
              type: string
            - name: comment_author_id
              type: string
            - name: liker_id
              type: string
            - name: liker_username
              type: string
              doc: Prefixed with "UNLIKE:" when this is an unlike event
            - name: liker_photo_url
              type:
                - 'null'
                - string
              default: null
            - name: song_id
              type: string
            - name: station_id
              type: string
            - name: timestamp
              type: long
              logicalType: timestamp-millis

    KafkaNotificationPush:
      name: KafkaNotificationPush
      title: Notification Push (Avro)
      payload:
        schemaFormat: 'application/vnd.apache.avro+json;version=1.9.0'
        schema:
          type: record
          name: NotificationPushEvent
          namespace: com.rubymusic.realtime
          doc: Emitted by realtime-api-ms — instructs realtime-ws-ms to push a notification to a connected user
          fields:
            - name: notification_id
              type: string
            - name: recipient_id
              type: string
            - name: actor_id
              type: string
            - name: actor_username
              type: string
            - name: actor_photo_url
              type:
                - 'null'
                - string
              default: null
            - name: type
              type:
                type: enum
                name: NotificationType
                namespace: com.rubymusic.realtime
                symbols: [COMMENT_REACTION, MENTION, FRIEND_REQUEST, FRIEND_ACCEPTED]
            - name: target_id
              type: string
            - name: target_type
              type: string
            - name: timestamp
              type: long
              logicalType: timestamp-millis
